<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIMI Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Tokens ──────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0B2E30;
  --surface: #0D3A3C;
  --surface-hover: #104547;
  --accent: #D9B36A;
  --accent-dim: rgba(217,179,106,0.15);
  --text: #E8D8BF;
  --text-muted: #8E9F8F;
  --text-dim: #6B8B7B;
  --border: #1A4F50;
  --danger: #C0544F;
  --success: #4CAF7D;
  --teal: #167A84;
  --font-h: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'Inter', sans-serif;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --sidebar-w: 220px;
}

html { font-size: 14px; }
body {
  font-family: var(--font-b);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}

#sidebar .brand {
  padding: 20px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-h);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.05em;
}

#sidebar nav { flex: 1; padding: 12px 0; }

#sidebar nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-b);
  font-size: 0.93rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s ease;
}

#sidebar nav button:hover { background: var(--accent-dim); color: var(--text); }
#sidebar nav button.active { color: var(--accent); background: var(--accent-dim); border-right: 3px solid var(--accent); }

#sidebar nav button svg { width: 18px; height: 18px; flex-shrink: 0; }

#sidebar .sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
}

#sidebar .sidebar-footer a { color: var(--text-dim); }
#sidebar .sidebar-footer a:hover { color: var(--accent); }

/* ── Main area ───────────────────────────────────────────────── */
#main {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#topbar {
  height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}

#topbar h1 {
  font-family: var(--font-h);
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--text);
}

#menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 4px;
}

#menu-toggle svg { width: 24px; height: 24px; }

#topbar .spacer { flex: 1; }

#topbar .refresh-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-b);
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s ease;
}

#topbar .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

#content {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

/* ── Cards grid (dashboard) ──────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-card .stat-number {
  font-family: var(--font-h);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}

.stat-card .stat-label {
  margin-top: 6px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.stat-card .stat-sub {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Section header (used on each page) ──────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.section-header h2 {
  font-family: var(--font-h);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text);
}

/* ── Tables ──────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

thead th {
  text-align: left;
  padding: 10px 12px;
  background: rgba(0,0,0,0.15);
  color: var(--text-muted);
  font-weight: 500;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
}

tbody td {
  padding: 9px 12px;
  border-bottom: 1px solid rgba(26,79,80,0.4);
  vertical-align: top;
}

tbody tr:hover { background: rgba(217,179,106,0.04); }

tbody tr:last-child td { border-bottom: none; }

/* ── Badges ──────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  white-space: nowrap;
}

.badge-gold { background: rgba(217,179,106,0.2); color: #D9B36A; }
.badge-teal { background: rgba(22,122,132,0.25); color: #3DC8D4; }
.badge-green { background: rgba(76,175,125,0.2); color: #4CAF7D; }
.badge-red { background: rgba(192,84,79,0.2); color: #E07575; }
.badge-grey { background: rgba(142,159,143,0.2); color: #8E9F8F; }

/* ── Buttons ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 500;
}

.btn-primary:hover { background: #c9a35a; border-color: #c9a35a; color: var(--bg); }

.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }

.btn-sm { padding: 4px 8px; font-size: 0.78rem; }

/* ── Filter bar ──────────────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.filter-bar .btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* ── Status select ───────────────────────────────────────────── */
.status-select {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 6px;
  border-radius: 4px;
  font-family: var(--font-b);
  font-size: 0.8rem;
  cursor: pointer;
}

.status-select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
.status-select option { background: var(--surface); color: var(--text); }

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.modal-header h3 {
  font-family: var(--font-h);
  font-size: 1.3rem;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
}

.modal-close:hover { color: var(--text); }

.modal-body { padding: 20px; }

.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* ── Form ────────────────────────────────────────────────────── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }

.form-group label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
}

.form-group input,
.form-group select,
.form-group textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 10px;
  color: var(--text);
  font-family: var(--font-b);
  font-size: 0.85rem;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.form-group textarea { resize: vertical; min-height: 60px; }

/* ── Story text view ─────────────────────────────────────────── */
.story-text {
  white-space: pre-wrap;
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
  max-height: 60vh;
  overflow-y: auto;
  padding: 4px 0;
}

/* ── Empty state ─────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
}

.empty-state .empty-icon { font-size: 2rem; margin-bottom: 8px; }

/* ── Loading ─────────────────────────────────────────────────── */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}

/* ── Truncated cell ──────────────────────────────────────────── */
.cell-truncate {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cell-clickable { cursor: pointer; }
.cell-clickable:hover { color: var(--accent); }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #menu-toggle { display: block; }

  .form-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }

  #content { padding: 16px; }
}

/* ── Overlay for mobile sidebar ──────────────────────────────── */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
}

#sidebar-overlay.active { display: block; }

/* ── Checkbox-like toggle ────────────────────────────────────── */
.toggle-active {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 4px;
}

.toggle-active.on { background: var(--success); }
.toggle-active.off { background: var(--danger); }
</style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="brand">ANIMI Admin</div>
  <nav id="nav">
    <button data-page="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button data-page="books">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Books
    </button>
    <button data-page="cartoons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Cartoons
    </button>
    <button data-page="orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Orders
    </button>
    <button data-page="stories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Stories
    </button>
    <button data-page="contacts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Contacts
    </button>
  </nav>
  <div class="sidebar-footer">
    <a href="/" target="_blank">&#8592; Back to site</a>
  </div>
</aside>

<!-- Main -->
<div id="main">
  <header id="topbar">
    <button id="menu-toggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 id="page-title">Dashboard</h1>
    <div class="spacer"></div>
    <button class="refresh-btn" id="refresh-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </header>
  <main id="content">
    <div class="loading">Loading...</div>
  </main>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ANIMI Admin — Single-file SPA
   ═══════════════════════════════════════════════════════════════ */

// ── API helper ──────────────────────────────────────────────────
const API = '/api/admin';

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (res.status === 401) {
    // Force browser to re-prompt for credentials
    window.location.reload();
    throw new Error('Unauthorized');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Helpers ─────────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.includes('T') ? '' : 'T00:00:00'));
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatPrice(kopecks) {
  if (kopecks == null) return '—';
  const rub = Math.round(kopecks);
  return rub.toLocaleString('ru-RU') + ' \u20BD';
}

function esc(s) {
  if (s == null) return '';
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}

function statusBadge(status) {
  const map = {
    new:        ['badge-gold', 'New'],
    paid:       ['badge-teal', 'Paid'],
    in_progress:['badge-teal', 'In Progress'],
    done:       ['badge-green', 'Done'],
    cancelled:  ['badge-red', 'Cancelled'],
  };
  const [cls, label] = map[status] || ['badge-grey', status || '—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function activeDot(val) {
  return `<span class="toggle-active ${val ? 'on' : 'off'}"></span>${val ? 'Yes' : 'No'}`;
}

// ── Modal helpers ───────────────────────────────────────────────
const modalRoot = document.getElementById('modal-root');

function openModal(title, bodyHTML, footerHTML) {
  modalRoot.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3>${esc(title)}</h3>
          <button class="modal-close" id="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        ${footerHTML ? `<div class="modal-footer">${footerHTML}</div>` : ''}
      </div>
    </div>
  `;
  document.getElementById('modal-close-btn').onclick = closeModal;
  modalRoot.querySelector('.modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
}

function closeModal() {
  modalRoot.innerHTML = '';
}

// ── State ───────────────────────────────────────────────────────
let currentPage = 'dashboard';
let currentData = {};

// ── Navigation ──────────────────────────────────────────────────
const nav = document.getElementById('nav');
const contentEl = document.getElementById('content');
const pageTitleEl = document.getElementById('page-title');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const menuToggle = document.getElementById('menu-toggle');
const refreshBtn = document.getElementById('refresh-btn');

const pageTitles = {
  dashboard: 'Dashboard',
  books: 'Books',
  cartoons: 'Cartoons',
  orders: 'Orders',
  stories: 'Stories',
  contacts: 'Contacts',
};

nav.addEventListener('click', e => {
  const btn = e.target.closest('button[data-page]');
  if (!btn) return;
  navigateTo(btn.dataset.page);
  closeSidebar();
});

menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('active');
});

sidebarOverlay.addEventListener('click', closeSidebar);

function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('active');
}

refreshBtn.addEventListener('click', () => navigateTo(currentPage));

function navigateTo(page) {
  currentPage = page;
  pageTitleEl.textContent = pageTitles[page] || page;
  nav.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  renderPage(page);
}

// ── Page router ─────────────────────────────────────────────────
async function renderPage(page) {
  contentEl.innerHTML = '<div class="loading">Loading...</div>';
  try {
    switch (page) {
      case 'dashboard': await renderDashboard(); break;
      case 'books':     await renderBooks(); break;
      case 'cartoons':  await renderCartoons(); break;
      case 'orders':    await renderOrders(); break;
      case 'stories':   await renderStories(); break;
      case 'contacts':  await renderContacts(); break;
    }
  } catch (err) {
    contentEl.innerHTML = `<div class="empty-state"><div class="empty-icon">!</div><p>Error: ${esc(err.message)}</p></div>`;
  }
}

// ══════════════════════════════════════════════════════════════════
// Dashboard
// ══════════════════════════════════════════════════════════════════
async function renderDashboard() {
  const stats = await api('/stats');
  contentEl.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">${stats.books}</div>
        <div class="stat-label">Books</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${stats.cartoons}</div>
        <div class="stat-label">Cartoons</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${stats.orders.total}</div>
        <div class="stat-label">Orders</div>
        <div class="stat-sub">
          New: ${stats.orders.new} &middot;
          Paid: ${stats.orders.paid} &middot;
          Done: ${stats.orders.done} &middot;
          Cancelled: ${stats.orders.cancelled}
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${stats.stories.total}</div>
        <div class="stat-label">Stories</div>
        <div class="stat-sub">Paid: ${stats.stories.paid} &middot; Unpaid: ${stats.stories.unpaid}</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${stats.contacts}</div>
        <div class="stat-label">Contacts</div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
// Books
// ══════════════════════════════════════════════════════════════════
async function renderBooks() {
  const books = await api('/books');
  currentData.books = books;

  contentEl.innerHTML = `
    <div class="section-header">

function bookFormHTML(book) {
  const v = book || {};
  return `<div class="form-grid">
    <div class="form-group"><label>Title *</label><input name="title" value="${esc(v.title)}" required></div>
    <div class="form-group"><label>Slug *</label><input name="slug" value="${esc(v.slug)}"></div>
    <div class="form-group full"><label>Description</label><textarea name="description">${esc(v.description)}</textarea></div>
    <div class="form-group full"><label>Therapy Effect</label><textarea name="therapy_effect">${esc(v.therapy_effect)}</textarea></div>
    <div class="form-group"><label>Age Min</label><input name="age_min" type="number" value="${v.age_min ?? 3}"></div>
    <div class="form-group"><label>Age Max</label><input name="age_max" type="number" value="${v.age_max ?? 10}"></div>
    <div class="form-group full"><label>Themes (comma-separated)</label><input name="themes" value="${esc(v.themes)}"></div>
    <div class="form-group"><label>24-page Price</label><input name="pages_24_price" type="number" value="${v.pages_24_price ?? 4900}"></div>
    <div class="form-group"><label>36-page Price</label><input name="pages_36_price" type="number" value="${v.pages_36_price ?? 6900}"></div>
    <div class="form-group"><label>Badge</label><input name="badge" value="${esc(v.badge)}"></div>
    <div class="form-group"><label>Image URL</label><input name="image_url" value="${esc(v.image_url)}"></div>
    <div class="form-group"><label>Sort Order</label><input name="sort_order" type="number" value="${v.sort_order ?? 0}"></div>
    <div class="form-group"><label>Active</label><select name="active"><option value="1" ${v.active !== 0 ? 'selected' : ''}>Yes</option><option value="0" ${v.active === 0 ? 'selected' : ''}>No</option></select></div>
  </div>`;
}

function openBookForm(book) {
  const isEdit = !!book;
  openModal(
    isEdit ? `Edit Book #${book.id}` : 'Add Book',
    bookFormHTML(book),
    `<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Save</button>`
  );
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-save').onclick = async () => {
    const fd = Object.fromEntries(
      [...modalRoot.querySelectorAll('input, textarea, select')].map(el => [el.name, el.value])
    );
    fd.active = Number(fd.active);
    fd.age_min = Number(fd.age_min);
    fd.age_max = Number(fd.age_max);
    fd.pages_24_price = Number(fd.pages_24_price);
    fd.pages_36_price = Number(fd.pages_36_price);
    fd.sort_order = Number(fd.sort_order);

    if (!fd.title || !fd.slug) return alert('Title and Slug are required.');

    try {
      if (isEdit) {
        await api(`/books/${book.id}`, { method: 'PUT', body: JSON.stringify(fd) });
      } else {
        await api('/books', { method: 'POST', body: JSON.stringify(fd) });
      }
      closeModal();
      await renderBooks();
    } catch (err) { alert('Error: ' + err.message); }
  };
}

async function deleteBook(id) {
  if (!confirm('Deactivate this book?')) return;
  try {
    await api(`/books/${id}`, { method: 'DELETE' });
    await renderBooks();
  } catch (err) { alert('Error: ' + err.message); }
}

// ══════════════════════════════════════════════════════════════════
// Orders
// ══════════════════════════════════════════════════════════════════
let ordersStatusFilter = null;

async function renderOrders() {
  const queryStr = ordersStatusFilter ? `?status=${ordersStatusFilter}` : '';
  const orders = await api('/orders' + queryStr);
  currentData.orders = orders;

  const filters = [
    [null,         'All'],
    ['new',        'New'],
    ['paid',       'Paid'],
    ['in_progress','In Progress'],
    ['done',       'Done'],
    ['cancelled',  'Cancelled'],
  ];

  contentEl.innerHTML = `
    <div class="section-header"><h2>Orders</h2></div>
    <div class="filter-bar">
      ${filters.map(([val, label]) =>
        `<button class="btn btn-sm ${ordersStatusFilter === val ? 'active' : ''}" data-status="${val}">${label}</button>`
      ).join('')}
    </div>
    ${orders.length === 0
      ? '<div class="empty-state"><p>No orders found.</p></div>'
      : `<div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>Order</th><th>Type</th><th>Product</th><th>Customer</th>
          <th>Phone</th><th>Email</th><th>Child</th><th>Status</th><th>Total</th><th>Date</th>
        </tr></thead>
        <tbody>${orders.map((o, i) => `<tr>
          <td>${i + 1}</td>
          <td style="white-space:nowrap">${esc(o.order_number)}</td>
          <td>${esc(o.type)}</td>
          <td class="cell-truncate">${esc(o.product_title)}</td>
          <td>${esc(o.customer_name)}</td>
          <td style="white-space:nowrap">${esc(o.customer_phone)}</td>
          <td>${esc(o.customer_email)}</td>
          <td>${esc(o.child_name)}</td>
          <td>
            <select class="status-select order-status-select" data-id="${o.id}">
              <option value="new" ${o.status==='new'?'selected':''}>New</option>
              <option value="paid" ${o.status==='paid'?'selected':''}>Paid</option>
              <option value="in_progress" ${o.status==='in_progress'?'selected':''}>In Progress</option>
              <option value="done" ${o.status==='done'?'selected':''}>Done</option>
              <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </td>
          <td style="white-space:nowrap">${formatPrice(o.total)}</td>
          <td style="white-space:nowrap">${formatDate(o.created_at)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`
    }
  `;

  // Filter buttons
  contentEl.querySelectorAll('.filter-bar .btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.status;
      ordersStatusFilter = val === 'null' ? null : val;
      renderOrders();
    });
  });

  // Status change
  contentEl.querySelectorAll('.order-status-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      try {
        await api(`/orders/${sel.dataset.id}`, {
          method: 'PUT',
          body: JSON.stringify({ status: sel.value }),
        });
      } catch (err) {
        alert('Error: ' + err.message);
        renderOrders();
      }
    });
  });
}

async function renderStories() {
  const stories = await api('/stories');
  currentData.stories = stories;

  contentEl.innerHTML = `
    <div class="section-header"><h2>Stories</h2></div>
    ${stories.length === 0
      ? '<div class="empty-state"><p>No stories generated yet.</p></div>'
      : `<div class="table-wrap"><table>
        <thead><tr>
          <th>ID</th><th>Child Name</th><th>Age</th><th>Problem</th>
          <th>Title</th><th>Paid</th><th>Date</th>
        </tr></thead>
        <tbody>${stories.map(s => `<tr>
          <td>${s.id}</td>
          <td>${esc(s.child_name)}</td>
          <td>${s.child_age ?? '—'}</td>
          <td class="cell-truncate">${esc(s.problem)}</td>
          <td class="cell-clickable view-story-btn" data-id="${s.id}">${esc(s.story_title) || '—'}</td>
          <td>${s.paid ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-grey">No</span>'}</td>
          <td style="white-space:nowrap">${formatDate(s.created_at)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`
    }
  `;

  contentEl.querySelectorAll('.view-story-btn').forEach(td => {
    td.addEventListener('click', () => {
      const story = stories.find(s => s.id == td.dataset.id);

      const text = story.story_full || story.story_preview || 'No story text available.';
      openModal(
        story.story_title || 'Story',
        `<div class="story-text">${esc(text)}</div>`,
        ''
      );
    });
  });
}
